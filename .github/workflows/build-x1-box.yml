name: X1 BOX - Signed (ULTRA-FAST)

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: x1box-signed-release
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    environment: release

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ccache-${{ runner.os }}-${{ github.ref }}
          restore-keys: |
            ccache-${{ runner.os }}-

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/wrapper
            ~/.gradle/caches
            ~/.gradle/build-cache
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*','**/gradle-wrapper.properties','**/gradle.properties','**/settings.gradle*','**/libs.versions.toml') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Android SDK
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.ANDROID_SDK_ROOT }}
            ~/.android
          key: androidsdk-${{ runner.os }}-api34-bt36.0.0-ndk29.0.14206865-cmake3.30.3
          restore-keys: |
            androidsdk-${{ runner.os }}-

      - name: Install SDK / NDK / CMake
        shell: bash
        run: |
          set -e
          BT="$ANDROID_SDK_ROOT/build-tools/36.0.0"
          PL="$ANDROID_SDK_ROOT/platforms/android-34"
          NDK="$ANDROID_SDK_ROOT/ndk/29.0.14206865"
          CM="$ANDROID_SDK_ROOT/cmake/3.30.3"

          if [ -d "$BT" ] && [ -d "$PL" ] && [ -d "$NDK" ] && [ -d "$CM" ]; then
            echo "SDK already installed"
          else
            yes | sdkmanager --licenses
            sdkmanager \
              "platform-tools" \
              "platforms;android-34" \
              "build-tools;36.0.0" \
              "cmake;3.30.3" \
              "ndk;29.0.14206865"
          fi

          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/29.0.14206865" >> $GITHUB_ENV
          echo "ANDROID_NDK_ROOT=$ANDROID_SDK_ROOT/ndk/29.0.14206865" >> $GITHUB_ENV

      - name: Install Linux build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            ninja-build \
            pkg-config \
            curl \
            unzip \
            ccache \
            python3 \
            python3-setuptools
          sudo apt-get clean

      - name: Enable ccache
        run: |
          echo "CCACHE_DIR=$HOME/.ccache" >> $GITHUB_ENV
          echo "CCACHE_MAXSIZE=2G" >> $GITHUB_ENV
          ccache -M 2G
          ccache -z
          echo "ORG_GRADLE_PROJECT_android.externalNativeBuild.cmake.arguments=-DCMAKE_C_COMPILER_LAUNCHER=ccache,-DCMAKE_CXX_COMPILER_LAUNCHER=ccache" >> $GITHUB_ENV

      - name: Cache Rust
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo
            ~/.rustup
          key: rust-${{ runner.os }}-stable

      - name: Install Rust
        run: |
          echo "CARGO_HOME=$HOME/.cargo" >> $GITHUB_ENV
          echo "RUSTUP_HOME=$HOME/.rustup" >> $GITHUB_ENV
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
          if ! command -v rustc >/dev/null 2>&1; then
            curl -sSf https://sh.rustup.rs | sh -s -- -y
          fi

      - name: Add Rust Android target
        run: rustup target add aarch64-linux-android

      - name: Export Android toolchain for cargo
        run: |
          echo "CC_aarch64_linux_android=$ANDROID_NDK_ROOT/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android26-clang" >> $GITHUB_ENV
          echo "CXX_aarch64_linux_android=$ANDROID_NDK_ROOT/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android26-clang++" >> $GITHUB_ENV
          echo "AR_aarch64_linux_android=$ANDROID_NDK_ROOT/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-ar" >> $GITHUB_ENV

      - name: Detect App Name + Version
        run: |
          GRADLE="android/app/build.gradle.kts"
          STRINGS="android/app/src/main/res/values/strings.xml"

          VERSION_NAME=$(grep -m1 -E 'versionName\s*=' "$GRADLE" | sed -E 's/.*"([^"]+)".*/\1/')
          APP_NAME=$(grep -m1 '<string name="app_name"' "$STRINGS" | sed -E 's/.*>([^<]+)<.*/\1/')

          APP_NAME_SAFE=$(echo "$APP_NAME" | tr ' ' '-' | tr -cd 'A-Za-z0-9._-')

          echo "VERSION_NAME=$VERSION_NAME" >> $GITHUB_ENV
          echo "APP_NAME=$APP_NAME" >> $GITHUB_ENV
          echo "APP_NAME_SAFE=$APP_NAME_SAFE" >> $GITHUB_ENV

      - name: Speed up Gradle
        run: |
          mkdir -p "$HOME/.gradle"
          GP="$HOME/.gradle/gradle.properties"

          echo "org.gradle.daemon=true" >> "$GP"
          echo "org.gradle.parallel=true" >> "$GP"
          echo "org.gradle.caching=true" >> "$GP"
          echo "org.gradle.jvmargs=-Xmx3g -Dkotlin.daemon.jvm.options=-Xmx2g" >> "$GP"
          echo "org.gradle.configuration-cache=true" >> "$GP"
          echo "org.gradle.configuration-cache.problems=warn" >> "$GP"

      - name: Fix gradlew JVM opts
        run: |
          sed -i 's/-Xmx64m/-Xmx2g -Xms256m/g' android/gradlew || true

      - name: Delete native cache
        run: rm -rf android/app/.cxx

      - name: Decode keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_B64 }}" | base64 -d > android/release.jks

      - name: Build Release
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew :app:assembleRelease :app:bundleRelease

      - name: Set unique Release Tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BASE="${APP_NAME_SAFE}-${VERSION_NAME}"
          TAG="$BASE"
          echo "REL_TAG=$TAG" >> $GITHUB_ENV
          echo "REL_NAME=$TAG" >> $GITHUB_ENV

      - name: Sign APK
        run: |
          APK="android/app/build/outputs/apk/release/app-release-unsigned.apk"
          FINAL="android/app/build/outputs/apk/release/${APP_NAME_SAFE}-${VERSION_NAME}.apk"

          "$ANDROID_SDK_ROOT/build-tools/36.0.0/apksigner" sign \
            --ks android/release.jks \
            --ks-pass pass:${{ secrets.ANDROID_KEYSTORE_PASSWORD }} \
            --ks-key-alias ${{ secrets.ANDROID_KEY_ALIAS }} \
            --key-pass pass:${{ secrets.ANDROID_KEY_PASSWORD }} \
            --out "$FINAL" "$APK"

          echo "SIGNED_APK=$FINAL" >> $GITHUB_ENV

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.REL_TAG }}
          name: ${{ env.REL_NAME }}
          files: |
            ${{ env.SIGNED_APK }}
            android/app/build/outputs/bundle/release/*.aab
