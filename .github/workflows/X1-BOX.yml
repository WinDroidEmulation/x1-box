name: X1 BOX - Signed

on:
  workflow_dispatch:

permissions:
  contents: write
  actions: read

concurrency:
  group: x1box-signed-release
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    environment: release

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Detect Gradle config
        id: meta
        shell: bash
        run: |
          set -e

          GRADLE="android/app/build.gradle.kts"
          STRINGS="android/app/src/main/res/values/strings.xml"

          [ -f "$GRADLE" ] || { echo "❌ $GRADLE not found"; exit 1; }
          [ -f "$STRINGS" ] || { echo "❌ $STRINGS not found"; exit 1; }

          COMPILE_SDK=$(grep -m1 -E 'compileSdk\s*=\s*[0-9]+' "$GRADLE" | sed -E 's/[^0-9]*([0-9]+).*/\1/')
          BUILD_TOOLS=$(grep -m1 -E 'buildToolsVersion\s*=\s*"' "$GRADLE" | sed -E 's/.*"([^"]+)".*/\1/')
          NDK_VERSION=$(grep -m1 -E 'ndkVersion\s*=\s*"' "$GRADLE" | sed -E 's/.*"([^"]+)".*/\1/')
          MIN_SDK=$(grep -m1 -E 'minSdk\s*=\s*[0-9]+' "$GRADLE" | sed -E 's/[^0-9]*([0-9]+).*/\1/')
          TARGET_SDK=$(grep -m1 -E 'targetSdk\s*=\s*[0-9]+' "$GRADLE" | sed -E 's/[^0-9]*([0-9]+).*/\1/')
          VERSION_NAME=$(grep -m1 -E 'versionName\s*=\s*"' "$GRADLE" | sed -E 's/.*"([^"]+)".*/\1/')

          CMAKE_VERSION=$(awk '
            BEGIN{in_enb=0; in_cmake=0; brace=0}
            /externalNativeBuild[[:space:]]*\{/ {in_enb=1}
            {
              if(in_enb){
                oc=gsub(/\{/,"&"); cc=gsub(/\}/,"&"); brace += (oc-cc)
                if($0 ~ /cmake[[:space:]]*\{/){in_cmake=1}
                if(in_cmake && match($0,/version[[:space:]]*=[[:space:]]*"([^"]+)"/,m)){
                  print m[1]; exit
                }
                if(brace<=0){in_enb=0; in_cmake=0; brace=0}
              }
            }
          ' "$GRADLE" || true)

          if [ -z "$CMAKE_VERSION" ]; then
            CMAKE_VERSION="3.30.3"
          fi

          APP_NAME=$(grep -m1 -E '<string\s+name="app_name"\s*>' "$STRINGS" | sed -E 's/.*>([^<]+)<.*/\1/')
          APP_NAME_SAFE=$(echo "$APP_NAME" | tr ' ' '-' | tr -cd 'A-Za-z0-9._-')

          [ -n "$COMPILE_SDK" ] || { echo "❌ compileSdk not detected"; exit 1; }
          [ -n "$BUILD_TOOLS" ] || { echo "❌ buildToolsVersion not detected"; exit 1; }
          [ -n "$NDK_VERSION" ] || { echo "❌ ndkVersion not detected"; exit 1; }
          [ -n "$MIN_SDK" ] || { echo "❌ minSdk not detected"; exit 1; }
          [ -n "$TARGET_SDK" ] || { echo "❌ targetSdk not detected"; exit 1; }
          [ -n "$VERSION_NAME" ] || { echo "❌ versionName not detected"; exit 1; }
          [ -n "$APP_NAME_SAFE" ] || { echo "❌ app_name not detected"; exit 1; }

          {
            echo "COMPILE_SDK=$COMPILE_SDK"
            echo "BUILD_TOOLS=$BUILD_TOOLS"
            echo "NDK_VERSION=$NDK_VERSION"
            echo "CMAKE_VERSION=$CMAKE_VERSION"
            echo "MIN_SDK=$MIN_SDK"
            echo "TARGET_SDK=$TARGET_SDK"
            echo "VERSION_NAME=$VERSION_NAME"
            echo "APP_NAME=$APP_NAME"
            echo "APP_NAME_SAFE=$APP_NAME_SAFE"
          } >> "$GITHUB_ENV"

      - name: Install SDK / NDK / CMake (auto)
        shell: bash
        run: |
          set -e
          yes | sdkmanager --licenses
          sdkmanager \
            "platform-tools" \
            "platforms;android-${COMPILE_SDK}" \
            "build-tools;${BUILD_TOOLS}" \
            "cmake;${CMAKE_VERSION}" \
            "ndk;${NDK_VERSION}"

      - name: Decode keystore (release.jks)
        shell: bash
        run: |
          set -e
          echo "${{ secrets.ANDROID_KEYSTORE_B64 }}" | base64 -d > android/release.jks
          ls -la android/release.jks

      - name: Create key.properties (for Gradle signing)
        shell: bash
        run: |
          set -e
          cat > android/key.properties << EOF
          storeFile=release.jks
          storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          EOF
          cat android/key.properties | sed 's/=.*/=***hidden***/'

      - name: Build Release (Gradle signed)
        working-directory: android
        shell: bash
        run: |
          set -e
          chmod +x gradlew
          ./gradlew clean
          ./gradlew :app:assembleRelease

      - name: Prepare APK + Verify (apksigner only verify)
        shell: bash
        run: |
          set -e
          APK_DIR="android/app/build/outputs/apk/release"
          APK="$APK_DIR/app-release.apk"
          FINAL="$APK_DIR/${APP_NAME_SAFE}-${VERSION_NAME}.apk"

          if [ ! -f "$APK" ]; then
            echo "❌ app-release.apk not found"
            find android/app/build/outputs/apk -type f -name "*.apk" || true
            exit 1
          fi

          mv "$APK" "$FINAL"

          echo "## APK Signature Verification" > verify.txt
          "$ANDROID_SDK_ROOT/build-tools/${BUILD_TOOLS}/apksigner" verify --verbose "$FINAL" >> verify.txt

          echo "SIGNED_APK=$FINAL" >> "$GITHUB_ENV"

      - name: Set unique Release Tag
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          BASE="${APP_NAME_SAFE}-${VERSION_NAME}"
          TAG="$BASE"

          exists() {
            curl -s -H "Authorization: Bearer $GITHUB_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${GITHUB_REPOSITORY}/git/ref/tags/$1" \
              | grep -q '"ref"'
          }

          if exists "$TAG"; then
            TAG="${BASE}-build${GITHUB_RUN_NUMBER}"
            if exists "$TAG"; then
              TAG="${BASE}-run${GITHUB_RUN_ID}"
            fi
          fi

          echo "REL_TAG=$TAG" >> "$GITHUB_ENV"
          echo "REL_NAME=$TAG" >> "$GITHUB_ENV"

      - name: Create GitHub Release + Upload APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.REL_TAG }}
          name: ${{ env.REL_NAME }}
          body_path: verify.txt
          files: ${{ env.SIGNED_APK }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
