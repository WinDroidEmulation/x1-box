name: X1 BOX - Signed

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: x1box-signed-release
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    environment: release

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK / NDK / CMake
        run: |
          yes | sdkmanager --licenses
          sdkmanager \
            "platform-tools" \
            "platforms;android-36" \
            "build-tools;36.1.0" \
            "cmake;3.30.3" \
            "ndk;29.0.14206865"
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/29.0.14206865" >> $GITHUB_ENV
          echo "ANDROID_NDK_ROOT=$ANDROID_SDK_ROOT/ndk/29.0.14206865" >> $GITHUB_ENV
          echo "BUILD_TOOLS=36.1.0" >> $GITHUB_ENV

      - name: Install Linux build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ninja-build \
            meson \
            pkg-config \
            python3 \
            python3-pip \
            python3-setuptools \
            curl \
            unzip

      - name: Install Rust (rustup + cargo)
        shell: bash
        run: |
          set -e
          echo "CARGO_HOME=$HOME/.cargo" >> $GITHUB_ENV
          echo "RUSTUP_HOME=$HOME/.rustup" >> $GITHUB_ENV
          curl -sSf https://sh.rustup.rs | sh -s -- -y
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
          rustc --version
          cargo --version

      - name: Add Rust Android target (arm64)
        shell: bash
        run: |
          set -e
          rustup target add aarch64-linux-android
          rustup target list --installed

      - name: Export Android toolchain for cargo
        shell: bash
        run: |
          set -e
          echo "CC_aarch64_linux_android=$ANDROID_NDK_ROOT/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android26-clang" >> $GITHUB_ENV
          echo "CXX_aarch64_linux_android=$ANDROID_NDK_ROOT/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android26-clang++" >> $GITHUB_ENV
          echo "AR_aarch64_linux_android=$ANDROID_NDK_ROOT/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-ar" >> $GITHUB_ENV

      - name: Detect App Name + Version + minSdk/targetSdk (from build.gradle.kts)
        id: meta
        shell: bash
        run: |
          set -e

          GRADLE="android/app/build.gradle.kts"
          STRINGS="android/app/src/main/res/values/strings.xml"

          if [ ! -f "$GRADLE" ]; then
            echo "❌ $GRADLE not found"
            exit 1
          fi

          VERSION_NAME=$(grep -m1 -E 'versionName\s*=' "$GRADLE" | sed -E 's/.*"([^"]+)".*/\1/' || true)
          if [ -z "$VERSION_NAME" ]; then
            echo "❌ versionName not detected in $GRADLE"
            exit 1
          fi

          MIN_SDK=$(grep -m1 -E 'minSdk\s*=' "$GRADLE" | sed -E 's/[^0-9]*([0-9]+).*/\1/' || true)
          if [ -z "$MIN_SDK" ]; then
            echo "❌ minSdk not detected in $GRADLE"
            exit 1
          fi

          TARGET_SDK=$(grep -m1 -E 'targetSdk\s*=' "$GRADLE" | sed -E 's/[^0-9]*([0-9]+).*/\1/' || true)
          if [ -z "$TARGET_SDK" ]; then
            echo "❌ targetSdk not detected in $GRADLE"
            exit 1
          fi

          if [ ! -f "$STRINGS" ]; then
            echo "❌ $STRINGS not found"
            exit 1
          fi

          APP_NAME=$(grep -m1 -E '<string\s+name="app_name"\s*>' "$STRINGS" | sed -E 's/.*<string[^>]*name="app_name"[^>]*>([^<]+)<\/string>.*/\1/' || true)
          if [ -z "$APP_NAME" ]; then
            echo "❌ app_name not detected in $STRINGS"
            exit 1
          fi

          APP_NAME_SAFE=$(echo "$APP_NAME" | tr ' ' '-' | tr -cd 'A-Za-z0-9._-')
          if [ -z "$APP_NAME_SAFE" ]; then
            echo "❌ APP_NAME_SAFE empty after sanitize"
            exit 1
          fi

          echo "VERSION_NAME=$VERSION_NAME" >> $GITHUB_ENV
          echo "MIN_SDK=$MIN_SDK" >> $GITHUB_ENV
          echo "TARGET_SDK=$TARGET_SDK" >> $GITHUB_ENV
          echo "APP_NAME=$APP_NAME" >> $GITHUB_ENV
          echo "APP_NAME_SAFE=$APP_NAME_SAFE" >> $GITHUB_ENV

          echo "Detected APP_NAME=$APP_NAME"
          echo "Detected APP_NAME_SAFE=$APP_NAME_SAFE"
          echo "Detected VERSION_NAME=$VERSION_NAME"
          echo "Detected MIN_SDK=$MIN_SDK"
          echo "Detected TARGET_SDK=$TARGET_SDK"

      - name: Remove org.gradle.java.home (force setup-java)
        shell: bash
        run: |
          set -e
          echo "JAVA_HOME: $JAVA_HOME"
          java -version
          for f in android/gradle.properties gradle.properties "$HOME/.gradle/gradle.properties"; do
            if [ -f "$f" ]; then
              sed -i '/^\s*org\.gradle\.java\.home\s*=/d' "$f"
            fi
          done
          echo "ORG_GRADLE_PROJECT_org.gradle.java.home=" >> $GITHUB_ENV
          (grep -R "org.gradle.java.home" -n . || true)

      - name: Fix DEFAULT_JVM_OPTS in gradlew (Linux + Windows)
        shell: bash
        run: |
          set -e
          if [ -f android/gradlew ]; then
            sed -i 's/^DEFAULT_JVM_OPTS=.*/DEFAULT_JVM_OPTS="-Xmx2g -Xms256m"/' android/gradlew || true
            sed -i 's/"\\"-Xmx64m\\""/"-Xmx2g -Xms256m"/g' android/gradlew || true
            sed -i 's/"-Xmx64m"/"-Xmx2g -Xms256m"/g' android/gradlew || true
          fi
          if [ -f android/gradlew.bat ]; then
            sed -i 's/^set DEFAULT_JVM_OPTS=.*/set DEFAULT_JVM_OPTS=-Xmx2g -Xms256m/' android/gradlew.bat || true
          fi

      - name: Patch NDK prebuilt host tag (windows -> linux)
        shell: bash
        run: |
          set -e
          echo "Patching any hardcoded windows-x86_64 to linux-x86_64..."
          if [ -d android ]; then
            grep -RIl "windows-x86_64" android || true
            grep -RIl "windows-x86_64" android | xargs -r sed -i 's/windows-x86_64/linux-x86_64/g'
          fi
          echo "Verify:"
          (grep -R "windows-x86_64" -n android || true)

      - name: Delete .cxx (clean native cache)
        run: rm -rf android/app/.cxx

      - name: Decode keystore
        shell: bash
        run: |
          set -e
          echo "${{ secrets.ANDROID_KEYSTORE_B64 }}" | base64 -d > android/release.jks
          ls -la android/release.jks

      - name: Build Release (APK only)
        working-directory: android
        shell: bash
        run: |
          set -e
          chmod +x gradlew
          ./gradlew --version
          ./gradlew clean
          ./gradlew :app:assembleRelease

      - name: Set unique Release Tag (auto from app + version)
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          BASE="${APP_NAME_SAFE}-${VERSION_NAME}"
          TAG="$BASE"

          exists() {
            curl -s -H "Authorization: Bearer $GITHUB_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${GITHUB_REPOSITORY}/git/ref/tags/$1" \
              | grep -q '"ref"'
          }

          if exists "$TAG"; then
            TAG="${BASE}-build${GITHUB_RUN_NUMBER}"
            if exists "$TAG"; then
              TAG="${BASE}-run${GITHUB_RUN_ID}"
            fi
          fi

          echo "REL_TAG=$TAG" >> $GITHUB_ENV
          echo "REL_NAME=$TAG" >> $GITHUB_ENV
          echo "Using tag: $TAG"

      - name: Zipalign + Sign + Rename APK (v1+v2+v3) (no v4 / no idsig)
        shell: bash
        run: |
          set -e
          APK_DIR="android/app/build/outputs/apk/release"
          APK_UNSIGNED="$APK_DIR/app-release-unsigned.apk"
          APK_ALIGNED="$APK_DIR/app-release-unsigned-aligned.apk"
          FINAL_APK="$APK_DIR/${APP_NAME_SAFE}-${VERSION_NAME}.apk"

          if [ ! -f "$APK_UNSIGNED" ]; then
            echo "❌ Unsigned APK not found!"
            find android/app/build/outputs/apk -type f -name "*.apk" || true
            exit 1
          fi

          "$ANDROID_SDK_ROOT/build-tools/${BUILD_TOOLS}/zipalign" -f -p 4 \
            "$APK_UNSIGNED" "$APK_ALIGNED"

          "$ANDROID_SDK_ROOT/build-tools/${BUILD_TOOLS}/apksigner" sign \
            --ks android/release.jks \
            --ks-pass "pass:${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" \
            --ks-key-alias "${{ secrets.ANDROID_KEY_ALIAS }}" \
            --key-pass "pass:${{ secrets.ANDROID_KEY_PASSWORD }}" \
            --min-sdk-version "${MIN_SDK}" \
            --v1-signing-enabled true \
            --v2-signing-enabled true \
            --v3-signing-enabled true \
            --v4-signing-enabled false \
            --out "$FINAL_APK" \
            "$APK_ALIGNED"

          echo "## APK Signature Verification" > verify.txt
          echo "" >> verify.txt
          "$ANDROID_SDK_ROOT/build-tools/${BUILD_TOOLS}/apksigner" verify --verbose "$FINAL_APK" >> verify.txt

          rm -f "$APK_UNSIGNED" "$APK_ALIGNED"
          echo "SIGNED_APK=$FINAL_APK" >> $GITHUB_ENV

      - name: Create GitHub Release + Upload Signed APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "${{ env.REL_TAG }}"
          name: "${{ env.REL_NAME }}"
          draft: false
          prerelease: false
          body_path: verify.txt
          files: |
            ${{ env.SIGNED_APK }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
